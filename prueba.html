<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Citas (Prueba) - Habby</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #2563eb;
            --ok: #16a34a;
            --warn: #d97706;
            --danger: #dc2626;
            --border: #e5e7eb;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 16px 80px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.6rem;
        }

        .sub {
            margin: 0 0 20px;
            color: var(--muted);
        }

        .toolbar {
            display: grid;
            grid-template-columns: repeat(4, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 16px;
        }

        .field {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            font-size: .82rem;
            color: var(--muted);
        }

        .field input,
        .field select {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 10px;
            font-size: .95rem;
            background: #fff;
        }

        .actions {
            display: flex;
            align-items: end;
            gap: 8px;
        }

        button {
            border: 0;
            border-radius: 10px;
            padding: 10px 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary { background: var(--primary); color: #fff; }
        .btn-muted { background: #eef2ff; color: #1e40af; }

        .status {
            margin: 8px 0 14px;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: .92rem;
            background: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
            display: none;
        }

        .cards {
            display: grid;
            gap: 12px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 1px 2px rgba(0,0,0,.03);
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .badge {
            border-radius: 999px;
            padding: 4px 10px;
            font-size: .78rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge.confirmed { background: #dcfce7; color: #166534; }
        .badge.pending { background: #fef3c7; color: #92400e; }
        .badge.cancelled { background: #fee2e2; color: #991b1b; }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(180px, 1fr));
            gap: 10px;
        }

        .item small {
            display: block;
            color: var(--muted);
            font-size: .78rem;
            margin-bottom: 2px;
        }

        .card-actions {
            margin-top: 12px;
            display: flex;
            justify-content: flex-end;
        }

        .btn-danger {
            background: #fee2e2;
            color: #991b1b;
        }

        .btn-danger:hover {
            background: #fecaca;
        }

        .empty {
            text-align: center;
            color: var(--muted);
            padding: 24px;
            border: 1px dashed var(--border);
            border-radius: 12px;
            background: #fff;
        }

        @media (max-width: 860px) {
            .toolbar { grid-template-columns: 1fr 1fr; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Panel de citas/reservas (PRUEBA)</h1>
        <p class="sub">Visualiza las citas creadas desde el chatbot y sus datos de contacto asociados.</p>

        <div class="toolbar">
            <div class="field">
                <label for="apiBase">Base API</label>
                <input id="apiBase" value="https://habby-chatbot.vercel.app" />
            </div>

            <div class="field">
                <label for="status">Estado</label>
                <select id="status">
                    <option value="">Todos</option>
                    <option value="confirmed">Confirmadas</option>
                    <option value="pending">Pendientes</option>
                    <option value="cancelled">Canceladas</option>
                </select>
            </div>

            <div class="field">
                <label for="limit">Límite</label>
                <input id="limit" type="number" min="1" max="200" value="50" />
            </div>

            <div class="actions">
                <button class="btn-primary" id="btnLoad">Cargar</button>
                <button class="btn-muted" id="btnAuto">Auto 15s: OFF</button>
            </div>
        </div>

        <div id="statusBox" class="status"></div>
        <div id="summary" class="sub"></div>
        <div id="cards" class="cards"></div>
        <div id="empty" class="empty" style="display:none;">No hay citas para mostrar.</div>
    </div>

    <script>
        const $ = (id) => document.getElementById(id);
        const state = {
            autoTimer: null,
            lastCount: 0,
            lastBase: '',
        };

        function showStatus(message, type = 'info') {
            const box = $('statusBox');
            box.style.display = 'block';
            box.textContent = message;

            if (type === 'error') {
                box.style.background = '#fef2f2';
                box.style.color = '#b91c1c';
                box.style.borderColor = '#fecaca';
                return;
            }

            box.style.background = '#eff6ff';
            box.style.color = '#1d4ed8';
            box.style.borderColor = '#bfdbfe';
        }

        function hideStatus() {
            $('statusBox').style.display = 'none';
        }

        function formatDate(iso) {
            if (!iso) return '-';
            const date = new Date(iso);
            if (Number.isNaN(date.getTime())) return iso;
            return date.toLocaleString('es-PE', { timeZone: 'America/Lima' });
        }

        function cardTemplate(appt) {
            const lead = appt.lead || {};
            const statusClass = ['confirmed', 'pending', 'cancelled'].includes(appt.status) ? appt.status : 'pending';

            return `
                <article class="card">
                    <div class="top">
                        <strong>Cita #${appt.id}</strong>
                        <span class="badge ${statusClass}">${appt.status || 'sin estado'}</span>
                    </div>
                    <div class="grid">
                        <div class="item">
                            <small>Cliente</small>
                            <div>${lead.name || 'Sin nombre'}</div>
                        </div>
                        <div class="item">
                            <small>Contacto</small>
                            <div>${lead.phone || '-'}${lead.email ? ` · ${lead.email}` : ''}</div>
                        </div>
                        <div class="item">
                            <small>Inicio (Lima)</small>
                            <div>${formatDate(appt.starts_at)}</div>
                        </div>
                        <div class="item">
                            <small>Fin (Lima)</small>
                            <div>${formatDate(appt.ends_at)}</div>
                        </div>
                        <div class="item">
                            <small>Canal</small>
                            <div>${appt.channel || '-'}</div>
                        </div>
                        <div class="item">
                            <small>Distrito (lead)</small>
                            <div>${lead.district || '-'}</div>
                        </div>
                    </div>
                    ${appt.notes ? `<div style="margin-top:10px;"><small style="color:#6b7280;display:block;">Notas</small><div>${appt.notes}</div></div>` : ''}
                    <div class="card-actions">
                        <button class="btn-danger" data-delete-id="${appt.id}">Borrar cita</button>
                    </div>
                </article>
            `;
        }

        async function deleteAppointment(id) {
            const base = state.lastBase || $('apiBase').value.trim().replace(/\/$/, '');
            if (!base) {
                showStatus('Define una URL base valida.', 'error');
                return;
            }

            const accepted = window.confirm(`Se borrara la cita #${id}. Esta accion no se puede deshacer.\n\n¿Deseas continuar?`);
            if (!accepted) return;

            showStatus(`Borrando cita #${id}...`);

            try {
                const response = await fetch(`${base}/api/appointments?id=${encodeURIComponent(String(id))}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data?.error || 'No se pudo borrar la cita.');
                }

                showStatus(data.uiMessage || `Cita #${id} borrada correctamente.`);
                await loadAppointments();
            } catch (error) {
                showStatus(error.message || 'No se pudo borrar la cita.', 'error');
            }
        }

        async function loadAppointments() {
            const base = $('apiBase').value.trim().replace(/\/$/, '');
            const status = $('status').value;
            const limit = Math.min(Math.max(parseInt($('limit').value || '50', 10), 1), 200);
            state.lastBase = base;

            if (!base) {
                showStatus('Define una URL base válida.', 'error');
                return;
            }

            hideStatus();
            showStatus('Cargando citas...');

            const params = new URLSearchParams({ view: 'list', limit: String(limit) });
            if (status) params.set('status', status);

            const url = `${base}/api/appointments?${params.toString()}`;

            try {
                const response = await fetch(url, { method: 'GET' });
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data?.error || 'Error consultando citas.');
                }

                const appointments = Array.isArray(data.appointments) ? data.appointments : [];
                state.lastCount = appointments.length;

                $('summary').textContent = `Mostrando ${appointments.length} cita(s). Endpoint: ${data.endpoint || '/api/appointments'}`;
                $('cards').innerHTML = appointments.map(cardTemplate).join('');
                $('empty').style.display = appointments.length ? 'none' : 'block';

                showStatus(`Datos cargados correctamente (${appointments.length} resultado(s)).`);
            } catch (error) {
                $('cards').innerHTML = '';
                $('summary').textContent = '';
                $('empty').style.display = 'none';
                showStatus(error.message || 'No se pudo cargar el panel.', 'error');
            }
        }

        $('btnLoad').addEventListener('click', loadAppointments);

        $('cards').addEventListener('click', (event) => {
            const target = event.target;
            if (!(target instanceof HTMLElement)) return;
            const id = target.getAttribute('data-delete-id');
            if (!id) return;

            const appointmentId = parseInt(id, 10);
            if (!Number.isFinite(appointmentId)) return;

            deleteAppointment(appointmentId);
        });

        $('btnAuto').addEventListener('click', () => {
            const btn = $('btnAuto');

            if (state.autoTimer) {
                clearInterval(state.autoTimer);
                state.autoTimer = null;
                btn.textContent = 'Auto 15s: OFF';
                return;
            }

            state.autoTimer = setInterval(loadAppointments, 15000);
            btn.textContent = 'Auto 15s: ON';
            loadAppointments();
        });

        loadAppointments();
    </script>

    <script src="https://habby-chatbot.vercel.app/habby.js?v=20260320"></script>
</body>
</html>
